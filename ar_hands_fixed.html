<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Magic Hands - Holographic Globe</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #050505; font-family: 'Inter', sans-serif; }

    #loading {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; color: #00ffaa; text-shadow: 0 0 15px #00ffaa;
      transition: opacity 0.8s ease;
    }
    #loading h1 { margin: 0 0 10px; font-weight: 800; letter-spacing: 2px; font-size: 28px; }
    #loading p  { margin: 0 0 24px; opacity: 0.8; font-size: 15px; }
    .spinner {
      width: 44px; height: 44px; border-radius: 50%;
      border: 4px solid rgba(0,255,170,0.15); border-top-color: #00ffaa;
      animation: spin 1s linear infinite; margin-bottom: 22px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #startBtn {
      padding: 13px 36px; background: transparent;
      border: 2px solid #00ffaa; color: #00ffaa;
      font-size: 15px; font-family: 'Inter', sans-serif;
      letter-spacing: 2px; cursor: pointer; border-radius: 8px;
      text-transform: uppercase; font-weight: 700;
      transition: all 0.25s; position: relative; z-index: 101;
    }
    #startBtn:hover:not(:disabled) { background: #00ffaa; color: #000; }
    #startBtn:disabled { opacity: 0.5; cursor: default; }

    #videoEl {
      position: fixed; inset: 0; width: 100vw; height: 100vh;
      object-fit: cover; transform: scaleX(-1);
      z-index: 1; opacity: 0.38; filter: contrast(1.15) grayscale(0.15);
    }
    #webglCanvas  { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; }
    #overlayCanvas{ position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 3; pointer-events: none; }

    .dbg {
      position: fixed; z-index: 10; color: #00ffaa; text-shadow: 0 0 8px #00ffaa;
      padding: 12px 18px; background: rgba(0,15,5,0.45);
      border: 1px solid rgba(0,255,170,0.35); border-radius: 10px;
      font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600;
      pointer-events: none;
    }
    #dbgL { top: 22px; left: 22px; }
    #dbgR { top: 22px; right: 22px; text-align: right; }
    .dv { color: #fff; font-weight: 800; margin-left: 4px; }
    #hint {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 10; color: rgba(0,255,170,0.55); font-size: 13px;
      text-align: center; pointer-events: none; letter-spacing: 1px; white-space: nowrap;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h1>AR EXPERIENCE</h1>
  <p id="loadMsg">Click below to start</p>
  <button id="startBtn">Enable Camera</button>
</div>

<video id="videoEl" autoplay playsinline muted></video>
<canvas id="webglCanvas"></canvas>
<canvas id="overlayCanvas"></canvas>

<div class="dbg" id="dbgL">
  <div>FPS: <span class="dv" id="fpsV">0</span></div><br>
  <div>State: <span class="dv" id="stateV" style="color:#00ffaa">Idling</span></div>
</div>
<div class="dbg" id="dbgR">
  <div>Hands: <span class="dv" id="handsV">0</span></div><br>
  <div id="handLabels"></div>
</div>
<div id="hint">✊ Pinch = grab &nbsp;|&nbsp; 👋 Palm = push &nbsp;|&nbsp; 🤏 Pinch + spread fingers = zoom</div>

<script>
const videoEl       = document.getElementById('videoEl');
const webglCanvas   = document.getElementById('webglCanvas');
const overlayCanvas = document.getElementById('overlayCanvas');
const oc            = overlayCanvas.getContext('2d');
const loading       = document.getElementById('loading');
const startBtn      = document.getElementById('startBtn');
const loadMsg       = document.getElementById('loadMsg');
const fpsV          = document.getElementById('fpsV');
const stateV        = document.getElementById('stateV');
const handsV        = document.getElementById('handsV');
const handLabels    = document.getElementById('handLabels');

function resize() {
  overlayCanvas.width = webglCanvas.width   = window.innerWidth;
  overlayCanvas.height = webglCanvas.height = window.innerHeight;
  if (cam3D)    { cam3D.aspect = window.innerWidth/window.innerHeight; cam3D.updateProjectionMatrix(); }
  if (renderer) renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', resize);

// ── Three.js ──────────────────────────────────────────────
const scene  = new THREE.Scene();
const cam3D  = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
cam3D.position.z = 6;
const renderer = new THREE.WebGLRenderer({ canvas: webglCanvas, alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const BASE_R = 1.6, MIN_R = 0.3, MAX_R = 4.5;
let targetScale = 1.0;

const globeMat = new THREE.MeshBasicMaterial({ color: 0x00ffaa, wireframe: true, transparent: true, opacity: 0.9 });
const coreMat  = new THREE.MeshBasicMaterial({ color: 0x00ffaa, transparent: true, opacity: 0.13 });
const globe    = new THREE.Mesh(new THREE.SphereGeometry(BASE_R, 26, 26), globeMat);
globe.add(new THREE.Mesh(new THREE.SphereGeometry(BASE_R * 0.94, 12, 12), coreMat));
scene.add(globe);

// Confetti
const N=650, cPos=new Float32Array(N*3), cCol=new Float32Array(N*3), cVel=[];
for (let i=0;i<N;i++){
  cPos[i*3]=(Math.random()-.5)*32; cPos[i*3+1]=(Math.random()-.5)*22; cPos[i*3+2]=(Math.random()-.5)*16-5;
  const c=new THREE.Color().setHSL(Math.random(),.9,.6);
  cCol[i*3]=c.r; cCol[i*3+1]=c.g; cCol[i*3+2]=c.b;
  cVel.push({y:-Math.random()*.04-.01,x:(Math.random()-.5)*.02,ss:Math.random()*.002+.001,so:Math.random()*Math.PI*2});
}
const cGeo=new THREE.BufferGeometry();
cGeo.setAttribute('position',new THREE.BufferAttribute(cPos,3));
cGeo.setAttribute('color',new THREE.BufferAttribute(cCol,3));
const confetti=new THREE.Points(cGeo,new THREE.PointsMaterial({size:.13,vertexColors:true,transparent:true,opacity:.85}));
scene.add(confetti);

// ── State ─────────────────────────────────────────────────
const gVel       = new THREE.Vector3();
let isGrabbed    = false;
let isZooming    = false;
let prevPalmW    = new THREE.Vector3();

// Pinch zoom state — tracked per-hand using thumb(4) and middle-finger-tip(12)
// We use thumb + middle finger distance for zoom so it doesn't conflict with grab (thumb+index)
let prevPinchDist = null;
const PINCH_ZOOM_START  = 0.10;  // normalised dist to ENTER zoom mode
const PINCH_ZOOM_EXIT   = 0.055; // normalised dist to exit (back to grab threshold)
const GRAB_THRESH       = 0.055; // thumb-index pinch for grab

function toWorld(x,y){
  const v=new THREE.Vector3(-(x*2-1),-(y*2-1),.5).unproject(cam3D);
  v.sub(cam3D.position).normalize();
  const t=-cam3D.position.z/v.z;
  return new THREE.Vector3().copy(cam3D.position).addScaledVector(v,t);
}

// ── MediaPipe results ─────────────────────────────────────
let frameN=0,lastT=performance.now(),fpsBuf=[];

function onResults(res){
  if(loading.style.display!=='none'){loading.style.opacity='0';setTimeout(()=>{loading.style.display='none';},800);}

  const now=performance.now();
  fpsBuf.push(1000/(now-lastT));lastT=now;
  if(fpsBuf.length>20)fpsBuf.shift();
  if(frameN++%10===0)fpsV.textContent=Math.round(fpsBuf.reduce((a,b)=>a+b)/fpsBuf.length);

  oc.save();
  oc.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
  oc.scale(-1,1);
  oc.translate(-overlayCanvas.width,0);

  const lms=res.multiHandLandmarks||[], hdns=res.multiHandedness||[];
  handsV.textContent=lms.length;
  let grabbed=false, lblHTML='';

  // draw all hands
  for(let i=0;i<lms.length;i++){
    const lm=lms[i];
    const lbl=hdns[i].label==='Left'?'Right':'Left';
    lblHTML+=`<div>> ${lbl} Hand</div>`;
    drawConnectors(oc,lm,HAND_CONNECTIONS,{color:'rgba(0,255,170,0.35)',lineWidth:2});
    for(const idx of [4,8,12,16,20]){
      const p=lm[idx];
      oc.beginPath();
      oc.arc(p.x*overlayCanvas.width,p.y*overlayCanvas.height,7,0,Math.PI*2);
      oc.fillStyle='#00ffaa';oc.shadowBlur=18;oc.shadowColor='#00ffaa';
      oc.fill();oc.shadowBlur=0;
    }
  }

  handLabels.innerHTML=lblHTML;

  // ── SINGLE-HAND INTERACTIONS ──────────────────────────
  if(lms.length>=1){
    // Always use the first detected hand
    const lm = lms[0];
    const th  = lm[4];   // thumb tip
    const ix  = lm[8];   // index tip
    const mid = lm[12];  // middle finger tip
    const pa  = lm[0];   // wrist / palm

    // Thumb-index distance → grab
    const pinchGrab = Math.hypot(th.x - ix.x,  th.y - ix.y);
    // Thumb-middle distance → zoom control
    const pinchZoom = Math.hypot(th.x - mid.x, th.y - mid.y);

    const midW  = toWorld((th.x + ix.x) / 2,  (th.y + ix.y) / 2);
    const palmW = toWorld(pa.x, pa.y);
    const handVel = palmW.clone().sub(prevPalmW);
    prevPalmW.copy(palmW);
    const curR = BASE_R * globe.scale.x;

    // ── Zoom: thumb + middle finger spread ────────────
    // Enter zoom when pinchZoom > threshold, exit when it falls back small
    if(pinchZoom > PINCH_ZOOM_START || isZooming){
      // Stay in zoom as long as fingers are spread enough
      if(pinchZoom > PINCH_ZOOM_EXIT * 0.8){
        isZooming = true;

        if(prevPinchDist !== null){
          const delta = pinchZoom - prevPinchDist;
          targetScale = Math.max(MIN_R/BASE_R, Math.min(MAX_R/BASE_R, targetScale + delta * 2.8));
        }
        prevPinchDist = pinchZoom;

        // Draw zoom indicator — line between thumb and middle finger
        const tx = (1 - th.x)  * overlayCanvas.width,  ty = th.y  * overlayCanvas.height;
        const mx = (1 - mid.x) * overlayCanvas.width,   my = mid.y * overlayCanvas.height;
        oc.restore(); oc.save();
        oc.beginPath(); oc.moveTo(tx, ty); oc.lineTo(mx, my);
        oc.strokeStyle='rgba(56,189,248,0.7)'; oc.lineWidth=2.5; oc.setLineDash([6,4]); oc.stroke(); oc.setLineDash([]);
        for(const[px,py]of[[tx,ty],[mx,my]]){
          oc.beginPath(); oc.arc(px,py,10,0,Math.PI*2);
          oc.strokeStyle='#38bdf8'; oc.lineWidth=2.5; oc.shadowBlur=12; oc.shadowColor='#38bdf8'; oc.stroke(); oc.shadowBlur=0;
        }
        oc.restore(); oc.save(); oc.scale(-1,1); oc.translate(-overlayCanvas.width,0);

        stateV.textContent='Zooming'; stateV.style.color='#38bdf8';
        globeMat.color.setHex(0x38bdf8); coreMat.color.setHex(0x38bdf8);
        grabbed = false;
        isGrabbed = false;
      } else {
        // fingers came back together — exit zoom
        isZooming = false;
        prevPinchDist = null;
      }
    } else {
      isZooming = false;
      prevPinchDist = null;
    }

    // ── Grab / Push: only when NOT zooming ────────────
    if(!isZooming){
      if(pinchGrab < GRAB_THRESH && midW.distanceTo(globe.position) < curR * 2.6){
        grabbed = true; isGrabbed = true;
        const pull = midW.clone().sub(globe.position).multiplyScalar(0.42);
        globe.position.add(pull); gVel.copy(pull);
      } else if(!isGrabbed && palmW.distanceTo(globe.position) < curR * 1.6){
        if(handVel.length() > 0.08){
          gVel.addScaledVector(handVel, 1.0);
          stateV.textContent='Pushed!'; stateV.style.color='#ffbb00';
        }
      }
    }
  } else {
    // No hands detected
    isZooming = false;
    prevPinchDist = null;
  }

  // state UI (only update if not already set this frame)
  if(!isZooming){
    if(grabbed){
      stateV.textContent='Grabbing'; stateV.style.color='#ff0055';
      globeMat.color.setHex(0xff0055); coreMat.color.setHex(0xff0055);
    } else {
      isGrabbed = false;
      if(['Grabbing','Idling','Zooming'].includes(stateV.textContent)){
        stateV.textContent='Floating'; stateV.style.color='#00ffaa';
      }
      globeMat.color.lerp(new THREE.Color(0x00ffaa), 0.12);
      coreMat.color.lerp(new THREE.Color(0x00ffaa), 0.12);
    }
  }

  oc.restore();
}

const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:.65,minTrackingConfidence:.65});
hands.onResults(onResults);

startBtn.addEventListener('click',async()=>{
  startBtn.disabled=true; loadMsg.textContent='Requesting camera...';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},facingMode:'user'}});
    videoEl.srcObject=stream; await videoEl.play();
    loadMsg.textContent='Loading hand tracking...';
    let fc=0;
    async function loop(){
      if(videoEl.readyState>=2){try{await hands.send({image:videoEl});}catch(_){}if(++fc===6)loadMsg.textContent='Almost ready...';}
      requestAnimationFrame(loop);
    }
    loop();
  }catch(e){loadMsg.textContent='Error: '+e.message;startBtn.disabled=false;startBtn.textContent='Try Again';}
});

resize();

function animate(){
  requestAnimationFrame(animate);

  const curS=globe.scale.x;
  const newS=curS+(targetScale-curS)*0.1;
  globe.scale.setScalar(newS);

  if(!isGrabbed && !isZooming){
    gVel.addScaledVector(globe.position.clone().negate(),0.015);
    gVel.multiplyScalar(0.91);
    globe.position.add(gVel);

    const spd=gVel.length();
    if(spd>0.04){
      const sq=1+spd*1.1;
      globe.scale.set(sq*newS,newS/sq,newS);
      const q=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(1,0,0),gVel.clone().normalize());
      globe.quaternion.slerp(q,0.18);
    } else {
      globe.rotation.y+=0.006; globe.rotation.x+=0.003;
    }
  } else {
    globe.rotation.y+=isZooming?0.004:0.002;
  }

  const pa=confetti.geometry.attributes.position.array,t=Date.now();
  for(let i=0;i<N;i++){
    const v=cVel[i];
    pa[i*3+1]+=v.y; pa[i*3]+=Math.sin(t*v.ss+v.so)*0.018+v.x;
    if(pa[i*3+1]<-13){pa[i*3+1]=13;pa[i*3]=(Math.random()-.5)*32;}
  }
  confetti.geometry.attributes.position.needsUpdate=true;
  confetti.rotation.y+=0.0014;
  renderer.render(scene,cam3D);
}
animate();
</script>
</body>
</html>
